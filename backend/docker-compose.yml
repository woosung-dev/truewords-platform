services:
  backend:
    build: .
    ports:
      - "8000:8080"
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://truewords:truewords@postgres:5432/truewords
      QDRANT_URL: http://qdrant:6333
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

  postgres:
    image: postgres:17-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: truewords
      POSTGRES_PASSWORD: truewords
      POSTGRES_DB: truewords
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U truewords"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  qdrant_data:
  postgres_data:
